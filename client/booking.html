<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tel-U Room Hub - Form Booking</title>
</head>

<body>
    <h1>Form Peminjaman Ruangan</h1>
    <a href="index.html">⬅ Kembali ke Dashboard</a>
    <hr>

    <form id="bookingForm">
        <label for="roomId">ID Ruangan:</label><br>
        <input type="text" id="roomId" placeholder="Contoh: KU3.02.01" required><br><br>

        <label for="studentName">Nama Lengkap:</label><br>
        <input type="text" id="studentName" placeholder="Nama Anda" required><br><br>

        <label for="studentId">NIM:</label><br>
        <input type="text" id="studentId" placeholder="Contoh: 120222xxxx" required><br><br>

        <label for="bookingTime">Waktu Peminjaman:</label><br>
        <input type="datetime-local" id="bookingTime" required><br><br>

        <button type="submit">Kirim Pengajuan Booking</button>
    </form>
</body>

</html>
