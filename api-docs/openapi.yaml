openapi: 3.0.0
info:
  title: Tel-U Room Hub GraphQL API (OpenAPI Wrapper)
  version: 1.0.0
  description: |
    Dokumentasi API Tel-U Room Hub. 
    
    Karena proyek ini menggunakan arsitektur **GraphQL (Apollo Server 3)** yang berjalan pada 3 microservices terpisah, semua pemanggilan API yang asli dilakukan menggunakan metode **HTTP POST** ke root URL (`/`) dari masing-masing service dengan format JSON payload `{ "query": "...", "variables": {} }`.
    
    Untuk memudahkan pengujian dan visualisasi menggunakan Swagger, dokumentasi ini memetakan query dan mutation menjadi endpoint-endpoint virtual yang terpisah berdasarkan fungsionalitasnya.
    
    ### Alamat Microservices:
    * **View Available Room Service:** `http://localhost:4001` (Port 4001)
    * **Booking Room Service:** `http://localhost:4002` (Port 4002)
    * **Room Management Service:** `http://localhost:4003` (Port 4003)
servers:
  - url: http://localhost:4001
    description: View Available Room Service (Port 4001)
  - url: http://localhost:4002
    description: Booking Room Service (Port 4002)
  - url: http://localhost:4003
    description: Room Management Service (Port 4003)
tags:
  - name: Student Room View
    description: Memantau dan menyaring ruangan yang tersedia untuk dipesan.
  - name: Booking Reservations
    description: Alur pemesanan (booking) ruangan dan pembatalan pemesanan.
  - name: Room Management (Admin)
    description: Pengelolaan data inventaris ruangan (Melihat semua, menambah, menghapus).
paths:
  /getAvailableRooms:
    post:
      summary: Mendapatkan Semua Ruangan yang Tersedia (Student View)
      tags:
        - Student Room View
      description: |
        Mengambil daftar semua ruangan yang statusnya masih tersedia (`isAvailable: true`).
        
        **Target Server:** `http://localhost:4001` (View Available Room Service)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: |
                query GetAvailableRooms {
                  getAvailableRooms {
                    id
                    name
                    capacity
                    facility
                    isAvailable
                  }
                }
      responses:
        '200':
          description: Berhasil memuat daftar ruangan kosong.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAvailableRoomsResponse'
              example:
                data:
                  getAvailableRooms:
                    - id: "KU3.05.01"
                      name: "Integrated Lab Sandbox"
                      capacity: 30
                      facility: ["Projector", "Whiteboard", "High-Speed Wi-Fi", "AC"]
                      isAvailable: true

  /createBooking:
    post:
      summary: Melakukan Reservasi Ruangan (Booking)
      tags:
        - Booking Reservations
      description: |
        Membuat reservasi baru untuk ruangan tertentu. Setelah booking berhasil dibuat, status ruangan otomatis berubah menjadi tidak tersedia (`isAvailable: false`).
        
        **Target Server:** `http://localhost:4002` (Booking Room Service)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: |
                mutation CreateBooking($roomId: ID!, $studentName: String!, $studentId: String!, $bookingTime: String!) {
                  createBooking(roomId: $roomId, studentName: $studentName, studentId: $studentId, bookingTime: $bookingTime) {
                    id
                    roomId
                    studentName
                    studentId
                    bookingTime
                    status
                  }
                }
              variables:
                roomId: "KU3.05.01"
                studentName: "Azzam Rabbani"
                studentId: "1202220001"
                bookingTime: "2026-06-25 10:00:00"
      responses:
        '200':
          description: Booking berhasil dibuat.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateBookingResponse'
              example:
                data:
                  createBooking:
                    id: "1"
                    roomId: "KU3.05.01"
                    studentName: "Azzam Rabbani"
                    studentId: "1202220001"
                    bookingTime: "2026-06-25 10:00:00"
                    status: "CONFIRMED"

  /cancelBooking:
    post:
      summary: Membatalkan Reservasi Ruangan (Cancel Booking)
      tags:
        - Booking Reservations
      description: |
        Membatalkan booking yang sudah terkonfirmasi berdasarkan ID Booking. Status ruangan akan dikembalikan menjadi tersedia (`isAvailable: true`).
        
        **Target Server:** `http://localhost:4002` (Booking Room Service)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: |
                mutation CancelBooking($bookingId: ID!) {
                  cancelBooking(bookingId: $bookingId) {
                    id
                    roomId
                    studentName
                    status
                  }
                }
              variables:
                bookingId: "1"
      responses:
        '200':
          description: Booking berhasil dibatalkan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelBookingResponse'
              example:
                data:
                  cancelBooking:
                    id: "1"
                    roomId: "KU3.05.01"
                    studentName: "Azzam Rabbani"
                    status: "CANCELLED"

  /getAllRooms:
    post:
      summary: Mendapatkan Semua Daftar Ruangan (Admin View)
      tags:
        - Room Management (Admin)
      description: |
        Mengambil seluruh inventaris ruangan, baik yang kosong maupun yang sedang dibooking.
        
        **Target Server:** `http://localhost:4003` (Room Management Service)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: |
                query GetAllRooms {
                  getAllRooms {
                    id
                    name
                    capacity
                    facility
                    isAvailable
                  }
                }
      responses:
        '200':
          description: Berhasil memuat semua daftar ruangan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAllRoomsResponse'
              example:
                data:
                  getAllRooms:
                    - id: "KU3.05.01"
                      name: "Integrated Lab Sandbox"
                      capacity: 30
                      facility: ["Projector", "Whiteboard", "High-Speed Wi-Fi", "AC"]
                      isAvailable: true
                    - id: "KU3.05.02"
                      name: "Discussion Room 2A"
                      capacity: 10
                      facility: ["Whiteboard", "High-Speed Wi-Fi", "AC"]
                      isAvailable: false

  /addRoom:
    post:
      summary: Menambahkan Ruangan Baru ke Inventaris (Admin)
      tags:
        - Room Management (Admin)
      description: |
        Mendaftarkan ruangan baru beserta kelengkapannya ke dalam database. Secara default ruangan baru akan berstatus tersedia (`isAvailable: true`).
        
        **Target Server:** `http://localhost:4003` (Room Management Service)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: |
                mutation AddRoom($id: ID!, $name: String!, $capacity: Int!, $facility: [String!]!) {
                  addRoom(id: $id, name: $name, capacity: $capacity, facility: $facility) {
                    id
                    name
                    capacity
                    facility
                    isAvailable
                  }
                }
              variables:
                id: "KU3.05.03"
                name: "Discussion Room 2B"
                capacity: 12
                facility: ["Projector", "Whiteboard", "High-Speed Wi-Fi", "AC"]
      responses:
        '200':
          description: Ruangan berhasil ditambahkan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddRoomResponse'
              example:
                data:
                  addRoom:
                    id: "KU3.05.03"
                    name: "Discussion Room 2B"
                    capacity: 12
                    facility: ["Projector", "Whiteboard", "High-Speed Wi-Fi", "AC"]
                    isAvailable: true

  /deleteRoom:
    post:
      summary: Menghapus Ruangan dari Inventaris (Admin)
      tags:
        - Room Management (Admin)
      description: |
        Menghapus data ruangan dari database berdasarkan ID Ruangan.
        
        **Target Server:** `http://localhost:4003` (Room Management Service)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphQLRequest'
            example:
              query: |
                mutation DeleteRoom($id: ID!) {
                  deleteRoom(id: $id)
                }
              variables:
                id: "KU3.05.03"
      responses:
        '200':
          description: Ruangan berhasil dihapus.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteRoomResponse'
              example:
                data:
                  deleteRoom: "Ruangan dengan ID KU3.05.03 berhasil dihapus."

components:
  schemas:
    GraphQLRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: Dokumen GraphQL query atau mutation.
        variables:
          type: object
          description: Variabel yang dilewatkan ke query/mutation.
          nullable: true

    Room:
      type: object
      properties:
        id:
          type: string
          description: ID unik ruangan (berfungsi sebagai kode ruangan).
        name:
          type: string
          description: Nama lengkap ruangan.
        capacity:
          type: integer
          description: Kapasitas maksimum ruangan dalam satuan orang.
        facility:
          type: array
          items:
            type: string
          description: Daftar fasilitas yang tersedia di dalam ruangan.
        isAvailable:
          type: boolean
          description: Menandakan ketersediaan ruangan untuk di-booking.

    Booking:
      type: object
      properties:
        id:
          type: string
          description: ID unik transaksi pemesanan.
        roomId:
          type: string
          description: ID ruangan yang dipesan.
        studentName:
          type: string
          description: Nama mahasiswa yang memesan.
        studentId:
          type: string
          description: NIM mahasiswa yang memesan.
        bookingTime:
          type: string
          description: Waktu pemesanan (format YYYY-MM-DD HH:MM:SS).
        status:
          type: string
          description: Status pemesanan (CONFIRMED, CANCELLED).

    GetAvailableRoomsResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            getAvailableRooms:
              type: array
              items:
                $ref: '#/components/schemas/Room'

    CreateBookingResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            createBooking:
              $ref: '#/components/schemas/Booking'

    CancelBookingResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            cancelBooking:
              type: object
              properties:
                id:
                  type: string
                roomId:
                  type: string
                studentName:
                  type: string
                status:
                  type: string

    GetAllRoomsResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            getAllRooms:
              type: array
              items:
                $ref: '#/components/schemas/Room'

    AddRoomResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            addRoom:
              $ref: '#/components/schemas/Room'

    DeleteRoomResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            deleteRoom:
              type: string
