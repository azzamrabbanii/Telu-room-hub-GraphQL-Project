type Booking {
  id: ID!
  roomId: ID!
  room: Room!
  studentName: String!
  studentId: String!
  bookingTime: String!
  status: String!
}

type Mutation {
  createBooking(
    roomId: ID!
    studentName: String!
    studentId: String!
    bookingTime: String!
  ): Booking!
  cancelBooking(bookingId: ID!): Booking!
}
